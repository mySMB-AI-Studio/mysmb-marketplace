name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Xero server deps
        working-directory: plugins/xero/server
        run: npm ci || npm install
      - name: Build Xero server
        working-directory: plugins/xero/server
        run: npm run build
      - name: Run marketplace validator
        run: npx --yes tsx scripts/validate.ts
